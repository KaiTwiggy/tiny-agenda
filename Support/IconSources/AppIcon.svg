<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="sky" x1="8%" y1="0%" x2="92%" y2="100%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="45%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <radialGradient id="glow" cx="28%" cy="22%" r="70%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#a78bfa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#312e81" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bottom" cx="80%" cy="95%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#faf5ff" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2"/>
    </filter>
  </defs>
  <!-- Base -->
  <rect width="1024" height="1024" rx="230" fill="url(#sky)"/>
  <rect width="1024" height="1024" rx="230" fill="url(#glow)"/>
  <rect width="1024" height="1024" rx="230" fill="url(#bottom)"/>
  <!-- Calendar body -->
  <rect x="152" y="208" width="720" height="640" rx="56" fill="url(#sheet)" opacity="0.98"/>
  <rect x="152" y="208" width="720" height="132" rx="56" fill="#4c1d95" opacity="0.92"/>
  <rect x="152" y="260" width="720" height="80" fill="#4c1d95"/>
  <!-- Rings / binder -->
  <circle cx="280" cy="274" r="28" fill="#c4b5fd" opacity="0.9"/>
  <circle cx="512" cy="274" r="28" fill="#c4b5fd" opacity="0.9"/>
  <circle cx="744" cy="274" r="28" fill="#c4b5fd" opacity="0.9"/>
