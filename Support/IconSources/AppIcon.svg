  <g opacity="0.88">
    <rect x="232" y="420" width="88" height="88" rx="20" fill="#c7d2fe"/>
    <rect x="352" y="420" width="88" height="88" rx="20" fill="#c7d2fe"/>
    <rect x="472" y="420" width="88" height="88" rx="20" fill="#c7d2fe"/>
    <rect x="592" y="420" width="88" height="88" rx="20" fill="#c7d2fe"/>
    <rect x="712" y="420" width="88" height="88" rx="20" fill="#c7d2fe"/>
    <rect x="232" y="536" width="88" height="88" rx="20" fill="#c7d2fe"/>
    <rect x="352" y="536" width="88" height="88" rx="20" fill="url(#accent)" filter="url(#soft)"/>
    <rect x="472" y="536" width="88" height="88" rx="20" fill="#c7d2fe"/>
    <rect x="592" y="536" width="88" height="88" rx="20" fill="#c7d2fe"/>
    <rect x="712" y="536" width="88" height="88" rx="20" fill="#c7d2fe"/>
    <rect x="232" y="652" width="88" height="88" rx="20" fill="#c7d2fe"/>
    <rect x="352" y="652" width="88" height="88" rx="20" fill="#c7d2fe"/>
    <rect x="472" y="652" width="88" height="88" rx="20" fill="#c7d2fe"/>
