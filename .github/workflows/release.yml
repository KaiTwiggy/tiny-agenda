# Build TinyAgenda.app for tag v*, zip, attach to a GitHub Release.
#
# No Apple Developer account required: omit optional repository secrets.
# Optional: MACOS_CODESIGN_IDENTITY — Developer ID signing.
# Optional: SPARKLE_EDDSA_PRIVATE_KEY — Sparkle generate_keys private key for sign_update.

name: Release

on:
  push:
    tags:
      - "v*"
  # Run from: Actions → Release → “Run workflow” (e.g. after amending a tag; force-push often won’t re-fire tag events).
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to build (e.g. v1.0.1). Must already exist on the remote."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    # Normal run: ~5–25 min. Much longer usually means a hang — cancel and check logs; see scripts/build-app.sh + timing steps.
    timeout-minutes: 45
    env:
      # Tag push: use ref name. Manual run: use the tag you type in the UI.
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      # Prefer GitHub ZIP archives for tagged deps instead of full git working copies (smaller / faster; helps huge repos like Sparkle).
      SWIFTPM_USE_SOURCE_ARCHIVES: "1"
    steps:
      - name: Verify tag exists on GitHub (manual runs only)
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          URL="https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if ! git ls-remote "$URL" "refs/tags/${TAG}" | grep -q .; then
            echo "::error::Tag '${TAG}' was not found on GitHub (no refs/tags/${TAG})."
            echo "Create it on a commit and push: git tag ${TAG} && git push origin ${TAG}"
            echo "Check spelling — e.g. v1.0.0 is not the same as v1.0.0.0."
            exit 1
          fi
          echo "OK: found refs/tags/${TAG} on origin."

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Verify appcast.xml (Sparkle feed)
        run: |
          set -euo pipefail
          if [[ ! -f appcast.xml ]]; then
            echo "::error::appcast.xml is missing. Support/Info.plist SUFeedURL expects this file on the default branch (GitHub raw URL). Without it, Check for Updates returns a generic network error."
            exit 1
          fi

      # Sparkle compares appcast sparkle:version / shortVersionString to the built .app. If we only bump the git tag
      # but leave Support/Info.plist at 1.0.1, the appcast would advertise 1.0.1 while the zip is v1.0.5 — no update offered.
      - name: Stamp bundle versions from release tag
        run: |
          set -euo pipefail
          RAW="${RELEASE_TAG#v}"
          if [[ "${RAW}" == "${RELEASE_TAG}" ]]; then
            echo "::error::RELEASE_TAG must start with v (e.g. v1.0.5). Got: ${RELEASE_TAG}"
            exit 1
          fi
          PLIST="$GITHUB_WORKSPACE/Support/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${RAW}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${RAW}" "$PLIST"
          echo "Stamped ${PLIST} → CFBundleShortVersionString=${RAW}, CFBundleVersion=${RAW}"

      # Speed up Sparkle (large SPM binary) on repeat runs; first run can still take several minutes.
      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: |
            .build
            /Users/runner/Library/Caches/org.swift.swiftpm
            /Users/runner/Library/org.swift.swiftpm
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.swift', 'Package.resolved', 'Sources/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Build app bundle
        run: |
          set -euo pipefail
          chmod +x scripts/build-app.sh
          echo "::group::Package pins (if Sparkle version here ≠ Package.swift, this tag points at the wrong commit)"
          cat Package.resolved 2>/dev/null || echo "No Package.resolved — resolve may pick a newer Sparkle and take much longer."
          echo "::endgroup::"
          echo "::notice::Resolving Swift packages (Sparkle is large; first line may show [1/N] object counts — use SWIFTPM_USE_SOURCE_ARCHIVES + committed Package.resolved)."
          date -u "+%Y-%m-%dT%H:%M:%SZ resolve start"
          swift package resolve -v
          date -u "+%Y-%m-%dT%H:%M:%SZ resolve done"
          echo "::notice::Compiling release (linking Sparkle may take several more minutes with sparse logs — not frozen)."
          date -u "+%Y-%m-%dT%H:%M:%SZ build-app start"
          ./scripts/build-app.sh
          date -u "+%Y-%m-%dT%H:%M:%SZ build-app done"
          F="$GITHUB_WORKSPACE/TinyAgenda.app/Contents/Frameworks/Sparkle.framework/Versions/B/Sparkle"
          if [[ ! -f "$F" ]]; then
            echo "::error::Sparkle.framework missing from the app bundle (dyld will abort at launch). Re-run build-app.sh locally and ensure Sparkle is embedded."
            ls -la "$GITHUB_WORKSPACE/TinyAgenda.app/Contents/Frameworks" || true
            exit 1
          fi
          echo "OK: embedded Sparkle at $F"

      # Do not use `secrets` in `if:` — GitHub rejects it. Pass via env and branch in shell.
      - name: Developer ID codesign (optional)
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CODESIGN_IDENTITY:-}" ]; then
            echo "MACOS_CODESIGN_IDENTITY not set — skipping Developer ID codesign."
            exit 0
          fi
          APP="$GITHUB_WORKSPACE/TinyAgenda.app"
          codesign --force --deep --options runtime --sign "$MACOS_CODESIGN_IDENTITY" \
            "$APP/Contents/Frameworks/Sparkle.framework"
          codesign --force --deep --options runtime --sign "$MACOS_CODESIGN_IDENTITY" "$APP"

      - name: Create zip
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          ditto -c -k --sequesterRsrc --keepParent TinyAgenda.app "TinyAgenda-${RELEASE_TAG}.zip"

      # Download Sparkle only when signing (same version as Package.swift). Use find — tarball layout can vary.
      - name: Sparkle sign update (optional)
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
          SPARKLE_VERSION: "2.6.4"
        run: |
          set -euo pipefail
          if [ -z "${SPARKLE_EDDSA_PRIVATE_KEY:-}" ]; then
            echo "SPARKLE_EDDSA_PRIVATE_KEY not set — skipping Sparkle download and sign_update."
            exit 0
          fi
          SPARKLE_URL="https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          echo "Downloading ${SPARKLE_URL}"
          curl -fSL --retry 3 --retry-delay 2 -o /tmp/sparkle.tar.xz "$SPARKLE_URL"
          file /tmp/sparkle.tar.xz
          rm -rf /tmp/sparkle-extract
          mkdir -p /tmp/sparkle-extract
          tar -xJf /tmp/sparkle.tar.xz -C /tmp/sparkle-extract
          SIGN_UPDATE="$(find /tmp/sparkle-extract -name sign_update -type f | head -1)"
          if [ -z "${SIGN_UPDATE}" ]; then
            echo "::error::sign_update not found after extracting Sparkle tarball. Listing extract dir:"
            find /tmp/sparkle-extract -type f | head -50 || true
            exit 1
          fi
          chmod +x "$SIGN_UPDATE"
          echo "Using sign_update at ${SIGN_UPDATE}"
          printf '%s\n' "$SPARKLE_EDDSA_PRIVATE_KEY" > /tmp/sparkle_eddsa_private
          chmod 600 /tmp/sparkle_eddsa_private
          Z="$GITHUB_WORKSPACE/TinyAgenda-${RELEASE_TAG}.zip"
          "$SIGN_UPDATE" "$Z" -f /tmp/sparkle_eddsa_private | tee "$GITHUB_WORKSPACE/sparkle-signature-${RELEASE_TAG}.txt"
          rm -f /tmp/sparkle_eddsa_private

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          tag_name: ${{ env.RELEASE_TAG }}
          files: TinyAgenda-${{ env.RELEASE_TAG }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Sparkle signature to release (optional)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          F="$GITHUB_WORKSPACE/sparkle-signature-${RELEASE_TAG}.txt"
          if [ ! -f "$F" ]; then
            echo "No sparkle-signature file — skipping upload."
            exit 0
          fi
          gh release upload "$RELEASE_TAG" "$F" --clobber

      # Replace appcast.xml with a single <item> (latest release only). Requires SPARKLE_EDDSA_PRIVATE_KEY (same as sign_update).
      - name: Update appcast.xml on default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SIG_FILE="$GITHUB_WORKSPACE/sparkle-signature-${RELEASE_TAG}.txt"
          if [[ ! -f "$SIG_FILE" ]]; then
            echo "No Sparkle signature — skipping appcast update (set repository secret SPARKLE_EDDSA_PRIVATE_KEY)."
            exit 0
          fi
          APP_PLIST="$GITHUB_WORKSPACE/TinyAgenda.app/Contents/Info.plist"
          if [[ ! -f "$APP_PLIST" ]]; then
            echo "::error::TinyAgenda.app missing; cannot read versions for appcast."
            exit 1
          fi
          SHORT=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP_PLIST")
          BUILD=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP_PLIST")
          MINOS=$(/usr/libexec/PlistBuddy -c 'Print :LSMinimumSystemVersion' "$APP_PLIST")
          ZIP="$GITHUB_WORKSPACE/TinyAgenda-${RELEASE_TAG}.zip"
          LEN=$(stat -f%z "$ZIP")
          REPO="${{ github.repository }}"
          ZIP_URL="https://github.com/${REPO}/releases/download/${RELEASE_TAG}/TinyAgenda-${RELEASE_TAG}.zip"
          cd "$GITHUB_WORKSPACE"
          git fetch origin "$DEFAULT_BRANCH"
          if ! git show "origin/${DEFAULT_BRANCH}:appcast.xml" > appcast.xml; then
            echo "::error::Could not read appcast.xml from origin/${DEFAULT_BRANCH}. Add appcast.xml to that branch first."
            exit 1
          fi
          python3 scripts/update-appcast.py \
            --appcast appcast.xml \
            --short-version "$SHORT" \
            --build-version "$BUILD" \
            --min-os "$MINOS" \
            --zip-url "$ZIP_URL" \
            --zip-length "$LEN" \
            --signature-file "$SIG_FILE"
          cp appcast.xml /tmp/appcast.updated.xml
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -f "$DEFAULT_BRANCH"
          cp /tmp/appcast.updated.xml appcast.xml
          git add appcast.xml
          if git diff --cached --quiet; then
            echo "appcast.xml unchanged after update — nothing to commit."
            exit 0
          fi
          git commit -m "chore(sparkle): appcast for ${RELEASE_TAG}"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:refs/heads/${DEFAULT_BRANCH}"
